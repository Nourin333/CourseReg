<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Course Registration Dashboard - Browse and register for available courses">
    <title>Dashboard — Course Registration Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">
    <!-- Top Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <div class="nav-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                    <path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5"/>
                </svg>
            </div>
            <h1 class="nav-title">Course Registration Portal</h1>
        </div>
        <div class="nav-right">
            <span class="nav-user" id="navUser">Welcome, Student</span>
            <button class="btn-logout" id="logoutBtn" onclick="handleLogout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-main">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content">
                <h2>📚 Available Courses</h2>
                <p>Browse and register for your preferred course. Select one course and complete the registration form below.</p>
            </div>
            <div class="hero-stats">
                <div class="stat-card">
                    <span class="stat-number" id="totalCourses">0</span>
                    <span class="stat-label">Courses</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="totalSeats">0</span>
                    <span class="stat-label">Total Seats</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="availableSeats">0</span>
                    <span class="stat-label">Available</span>
                </div>
            </div>
        </section>

        <!-- Course Grid -->
        <section class="courses-section">
            <div class="courses-grid" id="coursesGrid">
                <!-- Cards rendered by JS -->
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading courses...</p>
                </div>
            </div>
        </section>

        <!-- Registration Form (hidden initially) -->
        <section class="registration-section" id="registrationSection" style="display:none;">
            <div class="reg-card">
                <div class="reg-header">
                    <h2>📝 Registration Form</h2>
                    <div class="selected-course-badge" id="selectedCourseBadge">
                        <span id="selectedCourseName">-</span>
                        <button class="badge-close" onclick="clearSelection()">✕</button>
                    </div>
                </div>

                <form id="registrationForm" onsubmit="handleRegistration(event)">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="studentName">Student Name</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                <input type="text" id="studentName" placeholder="Enter your full name" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="studentPhone">Phone Number</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                                <input type="tel" id="studentPhone" placeholder="10-digit phone number" pattern="[0-9]{10,15}" required>
                            </div>
                        </div>
                        <div class="input-group full-width">
                            <label for="studentEmail">Email ID</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                                <input type="email" id="studentEmail" placeholder="student@example.com" required>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-register" id="submitRegBtn">
                        <span>Register for Course</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
